spring.application.name=Autenticacion
server.port=8089

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/autenticacion_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL del microservicio Registro (cambia segun entorno)
registro.url=${REGISTRO_URL:http://localhost:8088}

# Configuracion JWT
jwt.secret=miSecretoSuperSeguroParaFirmarTokensJWTDeTiendaDeVideojuegosDuoc2026
jwt.expiration=86400000